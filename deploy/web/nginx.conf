server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache since filenames are hashed by Vite
    location /app/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Redirect /app → /app/
    location = /app {
        return 301 /app/;
    }

    # SPA shell must not be cached long-term — hashed JS/CSS under /app/assets/ are immutable.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA: all routes under /app/ serve index.html
    location /app/ {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Redirect bare root to the app
    location = / {
        return 301 /app/;
    }

    # Health check endpoint for Docker
    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
