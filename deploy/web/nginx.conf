server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache since filenames are hashed by Vite
    location /app/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Redirect /app → /app/
    location = /app {
        return 301 /app/;
    }

    # Vite `base: /app/` still emits these at dist root; map /app/<file> → html/<file>
    # (without this, try_files falls through to index.html and the SW/registerModule breaks.)
    location = /app/sw.js {
        alias /usr/share/nginx/html/sw.js;
        default_type application/javascript;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /app/manifest.json {
        alias /usr/share/nginx/html/manifest.json;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /app/vite.svg {
        alias /usr/share/nginx/html/vite.svg;
        add_header Cache-Control "public, max-age=86400";
    }
    location = /app/index.html {
        alias /usr/share/nginx/html/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA shell must not be cached long-term — hashed JS/CSS under /app/assets/ are immutable.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA: routes under /app/ serve dist root index.html (Vite base is /app/ but files sit at html root)
    location /app/ {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Redirect bare root to the app
    location = / {
        return 301 /app/;
    }

    # Health check endpoint for Docker
    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
