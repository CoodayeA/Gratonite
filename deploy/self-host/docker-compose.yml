# Gratonite Self-Hosted Instance
# Usage: cp .env.example .env && edit .env && docker compose up -d

services:
  # First-run setup: generates keys, runs migrations, creates admin account
  setup:
    image: ghcr.io/coodayea/gratonite-setup:latest
    build:
      context: ../../
      dockerfile: deploy/setup/Dockerfile
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-gratonite}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-gratonite}
      - REDIS_URL=redis://redis:6379
    volumes:
      - instance-keys:/app/keys
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-gratonite}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-gratonite}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gratonite}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/coodayea/gratonite-api:latest
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-gratonite}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-gratonite}
      - REDIS_URL=redis://redis:6379
      - PORT=4000
      - NODE_ENV=production
    volumes:
      - instance-keys:/app/keys
      - uploads:/app/uploads
    depends_on:
      setup:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    image: ghcr.io/coodayea/gratonite-web:latest
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped

  # Optional: LiveKit for voice/video
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
    profiles:
      - voice
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  instance-keys:
  uploads:
  caddy-data:
  caddy-config:
