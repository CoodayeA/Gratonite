services:
  # First-run setup: migrations, keypair, admin account
  setup:
    image: ghcr.io/coodayea/gratonite-setup:latest
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-gratonite}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-gratonite}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - instance-keys:/app/keys
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-gratonite}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-gratonite}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gratonite}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command:
      - sh
      - -ec
      - exec redis-server --requirepass "$REDIS_PASSWORD" --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "export REDISCLI_AUTH=\"$REDIS_PASSWORD\"; redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/coodayea/gratonite-api:latest
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-gratonite}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-gratonite}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PORT=4000
      - NODE_ENV=production
    volumes:
      - instance-keys:/app/keys
      - uploads:/app/uploads
    depends_on:
      setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  web:
    image: ghcr.io/coodayea/gratonite-web:latest
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped

  # Voice/video — optional, enable with: docker compose --profile voice up -d
  livekit:
    image: livekit/livekit-server:latest
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
    entrypoint:
      - /bin/sh
      - -ec
    command: |
      test -n "$LIVEKIT_API_KEY" || { echo >&2 "LIVEKIT_API_KEY is required for the voice profile"; exit 1; }
      test -n "$LIVEKIT_API_SECRET" || { echo >&2 "LIVEKIT_API_SECRET is required for the voice profile"; exit 1; }
      exec /livekit-server --config-body "$(cat <<EOF
      port: 7880
      rtc:
        tcp_port: 7881
        udp_port: 7882
        use_external_ip: true
      keys:
        $LIVEKIT_API_KEY: $LIVEKIT_API_SECRET
      EOF
      )"
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    profiles:
      - voice
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  instance-keys:
  uploads:
  caddy-data:
  caddy-config:
