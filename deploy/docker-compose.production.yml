services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: gratonite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gratonite
      POSTGRES_USER: gratonite
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gratonite-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gratonite"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gratonite-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - gratonite-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    image: node:20-alpine
    container_name: gratonite-api
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install --prod && node dist/index.js"
    environment:
      DATABASE_URL: postgresql://gratonite:${DB_PASSWORD}@postgres:5432/gratonite
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      BULLBOARD_ADMIN_TOKEN: ${BULLBOARD_ADMIN_TOKEN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APP_URL: ${APP_URL:-https://gratonite.chat}
      # Comma-separated if the SPA is served on multiple hosts (main + app subdomain).
      CORS_ORIGIN: ${CORS_ORIGIN:-https://gratonite.chat,https://app.gratonite.chat}
      PORT: 4000
      NODE_ENV: production
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-}
      INSTANCE_DOMAIN: ${INSTANCE_DOMAIN:-}
      FEDERATION_ENABLED: ${FEDERATION_ENABLED:-false}
      FEDERATION_ALLOW_INBOUND: ${FEDERATION_ALLOW_INBOUND:-false}
      FEDERATION_ALLOW_OUTBOUND: ${FEDERATION_ALLOW_OUTBOUND:-false}
      FEDERATION_ALLOW_JOINS: ${FEDERATION_ALLOW_JOINS:-false}
      RELAY_ENABLED: ${RELAY_ENABLED:-false}
      RELAY_URL: ${RELAY_URL:-}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    volumes:
      - ./api:/app
      - api_uploads:/app/uploads
    networks:
      - gratonite-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Web App
  web:
    image: nginx:alpine
    container_name: gratonite-web
    restart: unless-stopped
    volumes:
      - ./web/dist:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gratonite-network
    depends_on:
      - api

  # Self-hosted LiveKit for voice/video (pin a release tag in production after testing; align with apps/web livekit-client major)
  livekit:
    image: livekit/livekit-server:latest
    container_name: gratonite-livekit
    restart: unless-stopped
    command:
      - --config-body
      - |
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    ports:
      - "7881:7881"
      - "7882:7882/udp"
    networks:
      - gratonite-network
    depends_on:
      - redis

  # Caddy Reverse Proxy (integrates with existing setup)
  caddy:
    image: caddy:2.11-alpine
    container_name: gratonite-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /home/ferdinand/gratonite-releases:/srv/releases:ro
    networks:
      - gratonite-network
      - landing-network
    depends_on:
      - web
      - api
      - livekit

volumes:
  postgres_data:
  redis_data:
  api_uploads:
  caddy_data:
    name: gratonite_caddy_data
  caddy_config:
    name: gratonite_caddy_config

networks:
  gratonite-network:
    driver: bridge
  landing-network:
    external: true
    name: gratonite_default
