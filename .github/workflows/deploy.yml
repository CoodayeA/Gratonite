name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-deploy release verification
        run: |
          pnpm verify:deploy:artifacts
          pnpm --filter gratonite-api run build
          pnpm --filter gratonite-api run guard:placeholders
          pnpm --filter gratonite-web run build:vite
          pnpm --filter gratonite-web run guard:placeholders
          pnpm --filter gratonite-web run validate:sw-precache
          pnpm --dir apps/landing run build

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Add deploy target to known_hosts
        env:
          DEPLOY_SERVER: ${{ vars.DEPLOY_SERVER }}
        run: |
          target="${DEPLOY_SERVER:-178.156.253.237}"
          ssh-keyscan -H "$target" >> "$HOME/.ssh/known_hosts"
          ssh-keyscan -H gratonite.chat >> "$HOME/.ssh/known_hosts" || true

      - name: Deploy with canonical script
        env:
          DEPLOY_SERVER: ${{ vars.DEPLOY_SERVER }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          API_HEALTH_URL: ${{ vars.API_HEALTH_URL }}
          LANDING_BASE_URL: ${{ vars.LANDING_BASE_URL }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          RELEASES_URL: ${{ vars.RELEASES_URL }}
          SERVICE_WORKER_URL: ${{ vars.SERVICE_WORKER_URL }}
          WEB_MANIFEST_URL: ${{ vars.WEB_MANIFEST_URL }}
        run: |
          SERVER="${DEPLOY_SERVER:-178.156.253.237}" \
          USER="${DEPLOY_USER:-ferdinand}" \
          SSH_KEY="$HOME/.ssh/deploy_key" \
          API_HEALTH_URL="${API_HEALTH_URL:-https://api.gratonite.chat/health}" \
          LANDING_BASE_URL="${LANDING_BASE_URL:-https://gratonite.chat/}" \
          APP_BASE_URL="${APP_BASE_URL:-https://gratonite.chat/app/}" \
          RELEASES_URL="${RELEASES_URL:-https://gratonite.chat/releases}" \
          SERVICE_WORKER_URL="${SERVICE_WORKER_URL:-https://gratonite.chat/app/sw.js}" \
          WEB_MANIFEST_URL="${WEB_MANIFEST_URL:-https://gratonite.chat/app/manifest.json}" \
          bash deploy/deploy.sh

      - name: Deploy summary
        if: always()
        run: |
          {
            echo "## Production deploy guardrails"
            echo "- reran deploy artifact ownership, API/web build checks, landing build, and SW validation before SSH"
            echo "- canonical deploy path remains \`deploy/deploy.sh\`"
            echo "- deploy script performs remote preflight, migrations, API/public URL verification, diagnostics, and rollback guidance"
            echo "- operator sign-off checklist: \`docs/deploy-review-checklist.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
