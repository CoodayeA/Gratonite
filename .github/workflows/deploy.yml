name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build API
        run: |
          cd apps/api
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build Web
        run: |
          cd apps/web
          npm install
          npm run build

      - name: Build Landing Page
        run: |
          cd apps/landing
          npm install
          npm run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy/api
          mkdir -p deploy/web/dist
          cp -r apps/api/dist deploy/api/
          cp -r apps/api/drizzle deploy/api/
          cp apps/api/package.json deploy/api/
          cp apps/api/pnpm-lock.yaml deploy/api/
          cp apps/api/drizzle.config.ts deploy/api/
          cp -r apps/web/dist/. deploy/web/dist/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan gratonite.chat >> ~/.ssh/known_hosts

      - name: Upload to server
        run: |
          ssh ferdinand@gratonite.chat 'mkdir -p /home/ferdinand/gratonite-app/apps/landing/out /home/ferdinand/gratonite-app/apps/web/dist /home/ferdinand/gratonite-app/docker'
          rsync -avz deploy/ ferdinand@gratonite.chat:/home/ferdinand/gratonite-app/
          rsync -avz apps/landing/out/ ferdinand@gratonite.chat:/home/ferdinand/gratonite-app/apps/landing/out/
          rsync -avz apps/web/dist/ ferdinand@gratonite.chat:/home/ferdinand/gratonite-app/apps/web/dist/
          rsync -avz docker/ ferdinand@gratonite.chat:/home/ferdinand/gratonite-app/docker/

      - name: Restart containers and run migrations
        run: |
          ssh ferdinand@gratonite.chat \
            'cd /home/ferdinand/gratonite-app &&
             docker compose --env-file .env.production -f docker-compose.production.yml up -d --force-recreate api web &&
             docker exec gratonite-api sh -c "cd /app && node dist/db/migrate.js" &&
             docker compose -f docker-compose.production.yml ps'

      - name: Build and deploy web Docker image
        run: |
          ssh ferdinand@gratonite.chat '
            cd /home/ferdinand/gratonite-app &&
            docker build \
              -t gratonite-web:latest \
              -f docker/hetzner/web.Dockerfile . &&
            docker restart gratonite-web-1
          '
