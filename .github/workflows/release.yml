name: Build & Publish Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/coodayea

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: gratonite-api
            dockerfile: apps/api/Dockerfile
            context: .
          - image: gratonite-web
            dockerfile: apps/web/Dockerfile
            context: .
          - image: gratonite-setup
            dockerfile: deploy/setup/Dockerfile
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          IMAGE_REF: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "$IMAGE_REF"

  checksums:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums
        env:
          PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          for img in gratonite-api gratonite-web gratonite-setup; do
            docker pull "${PREFIX}/${img}:latest" 2>/dev/null || true
            docker inspect "${PREFIX}/${img}:latest" --format='{{.Id}}' >> checksums.txt 2>/dev/null || echo "N/A ${img}" >> checksums.txt
          done

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.txt
