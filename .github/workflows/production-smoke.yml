name: production-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '24 11 * * *'

concurrency:
  group: production-smoke-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter gratonite-web exec playwright install --with-deps chromium

      - name: Run production smoke
        env:
          SMOKE_BASE_URL: ${{ vars.SMOKE_BASE_URL || 'https://gratonite.chat' }}
          SMOKE_API_HEALTH_URL: ${{ vars.SMOKE_API_HEALTH_URL || 'https://api.gratonite.chat/health' }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_GUILD_ID: ${{ vars.SMOKE_GUILD_ID }}
          SMOKE_CHAT_CHANNEL_ID: ${{ vars.SMOKE_CHAT_CHANNEL_ID }}
          SMOKE_FORUM_CHANNEL_ID: ${{ vars.SMOKE_FORUM_CHANNEL_ID }}
          SMOKE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: pnpm --filter gratonite-web run smoke:production
