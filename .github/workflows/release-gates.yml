# Quality gates on every PR and push to main — catches breakages before they reach production.
# Does not run gate:data or DB integration tests (those need a real DATABASE_URL + seed data).
name: release-gates

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: release-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: i18n — locale parity (strict)
        run: pnpm i18n:check:strict

      - name: E2E primitives — doc paths
        run: pnpm audit:e2e

      - name: Deploy artifacts — ownership and ignore hygiene
        run: pnpm verify:deploy:artifacts

      # API: typecheck + lint + placeholder guard (no live DB)
      - name: API — build, lint, guard
        run: |
          pnpm --filter gratonite-api run build
          pnpm --filter gratonite-api run lint
          pnpm --filter gratonite-api run guard:placeholders

      - name: OpenAPI spec — validate
        run: pnpm --filter gratonite-api run validate:openapi

      - name: OpenAPI — coverage threshold (≥25 paths)
        run: pnpm --filter gratonite-api run validate:openapi-coverage

      # Web: same Vite-only build as production deploy (avoids known tsc issues in Setup.tsx)
      - name: Web — lint, guard, Vite build
        run: |
          pnpm --filter gratonite-web run lint
          pnpm --filter gratonite-web run guard:placeholders
          pnpm --filter gratonite-web run build:vite

      - name: Web — SW precache integrity check
        run: pnpm --filter gratonite-web run validate:sw-precache

      - name: Landing — static export build
        run: pnpm --dir apps/landing run build
