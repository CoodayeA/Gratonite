name: Bug Report
description: Report a bug in Gratonite
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web (gratonite.chat)
        - Desktop App (Electron)
        - Mobile App (iOS)
        - Mobile App (Android)
        - Self-Hosted Instance
        - Gratonite Server (Desktop)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "Chrome 122 on macOS 15, Firefox on Ubuntu 24.04, etc."

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Add screenshots or paste error logs if available.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help us fix this.
