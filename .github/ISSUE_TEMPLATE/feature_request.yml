name: Feature Request
description: Suggest a new feature for Gratonite
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make Gratonite better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the frustration or gap this feature addresses.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What's your proposed solution?
      description: How do you imagine this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or seen this done elsewhere?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chat / Messaging
        - Voice / Video
        - Guilds / Servers
        - Moderation
        - Federation
        - Self-Hosting
        - Mobile App
        - Desktop App
        - UI / Design
        - API / Bots
        - Other
    validations:
      required: true
