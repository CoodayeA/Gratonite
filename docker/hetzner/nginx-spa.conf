server {
  listen 80;
  listen [::]:80;

  server_name _;

  # Web app SPA — served at /app/
  # Assets are at /app/assets/... so root must include the /app path
  location /app/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /app/index.html;
  }

  # Auth routes served by web app (login, register, verify-email, invite)
  location ~ ^/(login|register|verify-email|invite)(/.*)?$ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /app/index.html;
  }

  # Landing page SPA — everything else
  location / {
    root /usr/share/nginx/landing;
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
