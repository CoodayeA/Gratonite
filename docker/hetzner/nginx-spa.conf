server {
  listen 80;
  listen [::]:80;

  server_name _;

  # Prevent caching of HTML files (SPA entry points)
  # Hashed assets (JS/CSS) are safe to cache indefinitely
  location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }

  # Redirect /app (no trailing slash) → /app/
  location = /app {
    return 301 /app/;
  }

  # Web app SPA — served at /app/
  # Assets are at /app/assets/... so root must include the /app path
  location /app/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /app/index.html;

    # index.html fallback should not be cached
    location = /app/index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
  }

  # Release downloads — files mounted from /home/ferdinand/gratonite-releases
  location /downloads/ {
    alias /usr/share/nginx/downloads/;
    default_type application/octet-stream;
    add_header Content-Disposition "attachment";
    try_files $uri =404;
  }

  # Windows installer - serve with correct MIME type
  location ~* \.exe$ {
    root /usr/share/nginx/html;
    default_type application/octet-stream;
    add_header Content-Disposition "attachment; filename=\"Gratonite-Setup.exe\"";
    try_files $uri =404;
  }

  # Landing page (Next.js static export) — everything else
  # Each route has its own directory with index.html (trailingSlash: true)
  location / {
    root /usr/share/nginx/landing;
    index index.html;
    try_files $uri $uri/index.html $uri/ /index.html;

    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
  }

  location = /healthz {
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
