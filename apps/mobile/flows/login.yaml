appId: chat.gratonite.mobile
env:
  TEST_EMAIL: ${MAESTRO_EMAIL}
  TEST_PASSWORD: ${MAESTRO_PASSWORD}
---
- launchApp
- assertVisible: "Login"
- tapOn:
    id: "email-input"
- inputText: "${TEST_EMAIL}"
- tapOn:
    id: "password-input"
- inputText: "${TEST_PASSWORD}"
- tapOn: "Sign In"
- assertVisible: "Servers"
