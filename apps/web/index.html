<!doctype html>
<html lang="en" data-theme="default">

<head>
  <script>
    (function(){
      var t=localStorage.getItem('gratonite_theme')||'default';
      document.documentElement.setAttribute('data-theme',t);
      var m=localStorage.getItem('gratonite_color_mode')||
        (window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
      document.documentElement.setAttribute('data-color-mode',m);
    })();
  </script>
  <script type="module">
    if (import.meta.env.DEV) {
      import("react-grab");
    }
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Gratonite Web App - The next generation communication platform." />
  <meta name="theme-color" content="#030305">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://tenor.googleapis.com">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/app/manifest.json">
  <title>Gratonite | Web App</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
