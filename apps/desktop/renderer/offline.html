<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gratonite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0f15;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }
    .container {
      text-align: center;
      max-width: 420px;
      padding: 40px;
      -webkit-app-region: no-drag;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 16px;
      background: rgba(109, 40, 217, 0.15);
      display: grid;
      place-items: center;
    }
    .icon svg {
      width: 32px;
      height: 32px;
      color: #8b5cf6;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: #8b95a8;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    button {
      background: #6D28D9;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #7c3aed; }
    button:active { background: #5b21b6; }
    .status {
      margin-top: 16px;
      font-size: 12px;
      color: #5c6479;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1>Can't reach Gratonite</h1>
    <p>Check your internet connection and try again. Gratonite needs a network connection to work.</p>
    <button id="retry">Try Again</button>
    <div class="status" id="status"></div>
  </div>
  <script>
    const retryBtn = document.getElementById('retry');
    const status = document.getElementById('status');
    retryBtn.addEventListener('click', () => {
      status.textContent = 'Reconnecting...';
      retryBtn.disabled = true;
      if (window.gratonite && window.gratonite.retryConnection) {
        window.gratonite.retryConnection();
      }
      setTimeout(() => {
        retryBtn.disabled = false;
        status.textContent = '';
      }, 3000);
    });
  </script>
</body>
</html>
